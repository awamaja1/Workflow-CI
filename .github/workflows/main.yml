name: MLflow CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  run-mlflow:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn
          
      - name: Run MLflow Project
        run: |
          mlflow run MLProject --no-conda
          
      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          RUN_ID=$(ls mlruns/0 | grep -v meta.yaml | head -n 1)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          
      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v3
        with:
          name: model-artifacts
          path: mlruns/0/${{ env.RUN_ID }}/artifacts/model/
          
      # The criteria asks to build a docker image using mlflow build-docker and push to dockerhub.
      - name: Build Docker Image
        run: |
          mlflow models build-docker -m "mlruns/0/${{ env.RUN_ID }}/artifacts/model" -n "<DOCKER_USERNAME>/mlflow-model:latest"
          
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push Docker Image
        run: |
          docker push <DOCKER_USERNAME>/mlflow-model:latest
