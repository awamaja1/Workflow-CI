name: MLflow CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  run-mlflow:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn
          
      - name: Run MLflow Project
        run: |
          rm -rf mlruns
          mlflow run MLProject --env-manager=local
          
      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          # Find the numeric experiment ID folder
          EXP_ID=$(find mlruns -mindepth 1 -maxdepth 1 -type d -name "[0-9]*" -exec basename {} \; | head -n 1)
          # Find the run ID folder inside the experiment
          RUN_ID=$(find mlruns/$EXP_ID -mindepth 1 -maxdepth 1 -type d -not -name ".*" -exec basename {} \; | grep -v "datasets" | head -n 1)
          echo "EXP_ID=$EXP_ID" >> $GITHUB_ENV
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Model path: mlruns/$EXP_ID/$RUN_ID/artifacts/model"
          ls -la mlruns/$EXP_ID/$RUN_ID/artifacts/
          
      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: mlruns/${{ env.EXP_ID }}/${{ env.RUN_ID }}/artifacts/model/
          
      # The criteria asks to build a docker image using mlflow build-docker and push to dockerhub.
      - name: Build Docker Image
        run: |
          mlflow models build-docker -m "mlruns/${{ env.EXP_ID }}/${{ env.RUN_ID }}/artifacts/model" -n "${{ secrets.DOCKER_USERNAME }}/mlflow-model:latest"
          
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mlflow-model:latest
