name: MLflow CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  run-mlflow:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn
          
      - name: Run MLflow Project
        run: |
          mlflow run MLProject --env-manager=local
          
      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          # Get the experiment ID (numeric folder) first
          EXP_ID=$(ls mlruns/ | grep -E '^[0-9]+$' | head -n 1)
          # Get the run UUID (32-char hex folder inside the experiment)
          RUN_ID=$(ls mlruns/$EXP_ID | grep -E '^[0-9a-f]{32}$' | head -n 1)
          echo "EXP_ID=$EXP_ID" >> $GITHUB_ENV
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Model path: mlruns/$EXP_ID/$RUN_ID/artifacts/model"
          ls mlruns/$EXP_ID/$RUN_ID/artifacts/
          
      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: mlruns/${{ env.EXP_ID }}/${{ env.RUN_ID }}/artifacts/model/
          
      # The criteria asks to build a docker image using mlflow build-docker and push to dockerhub.
      - name: Build Docker Image
        run: |
          mlflow models build-docker -m "mlruns/${{ env.EXP_ID }}/${{ env.RUN_ID }}/artifacts/model" -n "${{ secrets.DOCKER_USERNAME }}/mlflow-model:latest"
          
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mlflow-model:latest
