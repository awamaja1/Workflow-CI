name: MLflow CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  run-mlflow:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn
          
      - name: Run MLflow Project
        run: |
          rm -rf mlruns
          mlflow run MLProject --env-manager=local
          
      - name: Verify model artifacts
        run: |
          echo "=== MLflow runs directory ==="
          find mlruns -type d -name "artifacts" | head -5
          echo "=== Model files ==="
          find mlruns -path "*/artifacts/model" -type d | head -1 | xargs ls -la 2>/dev/null || echo "Model directory listing"
